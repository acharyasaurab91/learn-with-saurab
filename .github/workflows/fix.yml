name: Fix server.js
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Replace server.js
        run: |
          curl -L "https://gist.githubusercontent.com/raw/fix/server.js" -o server.js
          node --check server.js && echo OK
      - name: Commit
        run: |
          git config user.email "a@a.com"
          git config user.name "bot"
          git add server.js
          git commit -m "clean server" || true
          git push
