name: Fix server.js
on:
  push:
    branches: [main]
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fix quotes
        run: |
          node -e "
          let c=require('fs').readFileSync('server.js','utf8');
          c=c.replace(/[\u2018\u2019]/g,\"'\");
          c=c.replace(/[\u201c\u201d]/g,'\"');
          c=c.replace(/\u2013|\u2014/g,'--');
          c=c.replace(/\u2026/g,'...');
          let lines=c.split('\n').filter(l=>l.trim()!='');
          require('fs').writeFileSync('server.js',lines.join('\n'));
          console.log('Fixed!');
          "
          node --check server.js
      - uses: actions/checkout@v3
      - run: git config user.email "action@github.com" && git config user.name "GitHub Action" && git add server.js && git commit -m "Auto-fix quotes" --allow-empty && git push
